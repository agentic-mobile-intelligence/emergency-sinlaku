application:
  name: emergency-sinlaku
  url: sinlaku.directory.gu
  pods:
    - name: web
      image: registry.nexlayer.io/nexlayer-mcp/emergency-sinlaku:latest
      path: /
      servicePorts:
        - 80
      vars:
        VITE_SUPABASE_URL: "PENDING_PRODUCTION_SUPABASE_URL"
        VITE_SUPABASE_PUBLISHABLE_KEY: "PENDING_PRODUCTION_SUPABASE_KEY"
