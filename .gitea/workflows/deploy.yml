name: Build & Deploy Sinlaku

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: gitea.elizaga.dev
  IMAGE: gitea.elizaga.dev/directory-gu/emergency-sinlaku

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Nexlayer
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via SSOT
        env:
          SSOT_WEBHOOK_URL: ${{ secrets.SSOT_WEBHOOK_URL }}
          SSOT_DEPLOY_SECRET: ${{ secrets.SSOT_DEPLOY_SECRET }}
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
        run: |
          HTTP=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${SSOT_WEBHOOK_URL}/deploy/sinlaku" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SSOT_DEPLOY_SECRET}" \
            -d "{\"sha\": \"${SHA_SHORT}\"}")
          cat response.json
          [[ "$HTTP" -ge 200 && "$HTTP" -lt 300 ]] || { echo "Trigger failed: HTTP $HTTP"; exit 1; }

      - name: Health check
        run: |
          sleep 45
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://sinlaku.directory.gu || echo "000")
          echo "sinlaku.directory.gu → HTTP $HTTP"
          [[ "$HTTP" == "200" ]] || echo "Warning: may still be starting"
