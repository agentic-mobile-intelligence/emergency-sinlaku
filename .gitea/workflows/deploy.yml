name: Build & Deploy Sinlaku

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: gitea.elizaga.dev
  IMAGE: gitea.elizaga.dev/directory-gu/emergency-sinlaku

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Nexlayer
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment YAML
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          # Replace hardcoded PAT with secret from Gitea CI
          sed "s/personalAccessToken: .*/personalAccessToken: ${REGISTRY_TOKEN}/" nexlayer.yaml > deploy.yaml
          echo "Prepared deploy.yaml:"
          cat deploy.yaml

      - name: Deploy to Nexlayer
        env:
          NEXLAYER_API_KEY: ${{ secrets.NEXLAYER_API_KEY }}
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST https://app.nexlayer.io/startUserDeployment \
            -H "Content-Type: application/yaml" \
            -H "Authorization: Bearer ${NEXLAYER_API_KEY}" \
            --data-binary @deploy.yaml)

          echo "Nexlayer response:"
          cat response.json

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "Deployment failed: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deployment initiated (HTTP $HTTP_CODE)"

      - name: Health check
        run: |
          echo "Waiting 60s for pods to come up..."
          sleep 60
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://sinlaku.directory.gu || echo "000")
          echo "Site status: HTTP $HTTP"
          if [[ "$HTTP" == "200" || "$HTTP" == "301" || "$HTTP" == "302" ]]; then
            echo "Deployment healthy"
          else
            echo "Warning: site returned HTTP $HTTP — may still be starting"
          fi
